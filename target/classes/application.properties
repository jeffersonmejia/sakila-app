# APP: DEFINES APPLICATION IDENTITY
spring.application.name=sakila

# DATASOURCE: DATABASE CONNECTION SETTINGS
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONNECTION POOL: MANAGES DB CONNECTION PERFORMANCE
spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.maximumPoolSize=5
spring.datasource.hikari.minimumIdle=1

# JPA: ORM AND DATABASE MAPPING CONFIGURATION
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# THYMELEAF: TEMPLATE ENGINE BEHAVIOR
spring.thymeleaf.cache=false

# DEVTOOLS: DEVELOPMENT AUTO-RELOAD FEATURES
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# MVC: DISABLE HTTP CACHE (APPLIES TO TEMPLATES RESPONSES)
spring.mvc.cache.period=0

# STATIC RESOURCES: FORCE NO CACHE
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
spring.web.resources.cache.cachecontrol.max-age=0

# DOCKER FILE WATCH FIX
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s