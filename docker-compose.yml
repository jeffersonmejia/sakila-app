services:
  mysql:
    image: mysql:8.0
    container_name: sakila_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/sakila-schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./db/sakila-data.sql:/docker-entrypoint-initdb.d/2-data.sql
    healthcheck:
      test: ['CMD-SHELL', "mysql -u root -p${DB_ROOT_PASSWORD} -e 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  app:
    image: maven:3.9-eclipse-temurin-17
    container_name: sakila_app_dev
    working_dir: /app
    volumes:
      - .:/app
      - maven_cache:/root/.m2
    command: mvn spring-boot:run
    ports:
      - '8080:8080'
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  maven_cache:
