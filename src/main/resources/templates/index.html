<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Films</title>

		<link rel="icon" th:href="@{/images/favicon.png}" type="image/png" />
		<link rel="stylesheet" th:href="@{/styles/app.css}" />
	</head>
	<body>
		<h1>Films</h1>

		<div class="card form">
			<input id="filmId" type="hidden" />
			<input id="title" placeholder="Title" />
			<select id="languageId"></select>
			<select id="rating">
				<option value="">Rating</option>
				<option value="G">G</option>
				<option value="PG">PG</option>
				<option value="PG_13">PG-13</option>
				<option value="R">R</option>
				<option value="NC_17">NC-17</option>
			</select>
			<input id="rentalDuration" type="number" placeholder="Rental Duration" />
			<input id="rentalRate" type="number" step="0.01" placeholder="Rental Rate" />
			<input
				id="replacementCost"
				type="number"
				step="0.01"
				placeholder="Replacement Cost"
			/>
			<button id="btnSave">Create</button>
		</div>

		<div class="card form">
			<input id="search" placeholder="Search by title..." />
			<button id="btnSearch">Search</button>
		</div>

		<div class="card table-container">
			<table>
				<thead>
					<tr>
						<th>No.</th>
						<th>Title</th>
						<th>Language</th>
						<th>Rating</th>
						<th>Actions</th>
					</tr>
				</thead>
				<tbody id="filmsTable"></tbody>
			</table>
		</div>

		<div class="pagination">
			<button id="btnPrev" class="secondary">Prev</button>
			<span id="pageInfo"></span>
			<button id="btnNext">Next</button>
		</div>

		<script th:src="@{/js/app.js}"></script>
	</body>
</html>
