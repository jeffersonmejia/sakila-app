<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8" />
		<title>Films</title>

		<link rel="icon" th:href="@{/images/favicon.png}" type="image/png" />
		<link rel="stylesheet" th:href="@{/styles/app.css}" />
	</head>
	<body>
		<h1>Films</h1>

		<div class="actions">
			<button id="btnLoad">Reload</button>
		</div>

		<table>
			<thead>
				<tr>
					<th>ID</th>
					<th>Title</th>
					<th>Actions</th>
				</tr>
			</thead>
			<tbody id="filmsTable"></tbody>
		</table>

		<h2>Form</h2>

		<div class="form">
			<input id="filmId" type="hidden" />
			<input id="title" placeholder="Title" />
			<input id="languageId" type="number" placeholder="Language ID" />

			<button id="btnCreate">Create</button>
			<button id="btnUpdate">Update</button>
		</div>

		<script th:src="@{/js/app.js}"></script>
	</body>
</html>
