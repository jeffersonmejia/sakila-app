<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Films</title>

		<link rel="icon" th:href="@{/images/favicon.png}" type="image/png" />
		<link rel="stylesheet" th:href="@{/styles/app.css}" />

		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
			rel="stylesheet"
		/>
	</head>
	<body>
		<h1>Films</h1>

		<div class="card form">
			<input id="filmId" type="hidden" />

			<div class="field">
				<div class="input-icon">
					<span class="material-symbols-outlined">movie</span>
					<input id="title" placeholder="Title" />
				</div>
				<small class="error-msg" id="error-title"></small>
			</div>

			<div class="field">
				<div class="input-icon">
					<span class="material-symbols-outlined">language</span>
					<select id="languageId"></select>
				</div>
				<small class="error-msg" id="error-languageId"></small>
			</div>

			<div class="field">
				<div class="input-icon">
					<span class="material-symbols-outlined">star</span>
					<select id="rating">
						<option value="">Rating</option>
						<option value="G">G</option>
						<option value="PG">PG</option>
						<option value="PG_13">PG-13</option>
						<option value="R">R</option>
						<option value="NC_17">NC-17</option>
					</select>
				</div>
				<small class="error-msg" id="error-rating"></small>
			</div>

			<div class="field">
				<div class="input-icon">
					<span class="material-symbols-outlined">schedule</span>
					<input id="rentalDuration" type="number" placeholder="Rental Duration" />
				</div>
				<small class="error-msg" id="error-rentalDuration"></small>
			</div>

			<div class="field">
				<div class="input-icon">
					<span class="material-symbols-outlined">attach_money</span>
					<input id="rentalRate" type="number" step="0.01" placeholder="Rental Rate" />
				</div>
				<small class="error-msg" id="error-rentalRate"></small>
			</div>

			<div class="field">
				<div class="input-icon">
					<span class="material-symbols-outlined">payments</span>
					<input
						id="replacementCost"
						type="number"
						step="0.01"
						placeholder="Replacement Cost"
					/>
				</div>
				<small class="error-msg" id="error-replacementCost"></small>
			</div>

			<button id="btnSave">
				<span class="material-symbols-outlined">save</span>
				Save
			</button>
		</div>

		<div class="card form">
			<input id="search" placeholder="Search by title..." />
			<button id="btnSearch">
				<span class="material-symbols-outlined">search</span>
				Search
			</button>
		</div>

		<div class="card table-container">
			<table>
				<thead>
					<tr>
						<th>No.</th>
						<th>Title</th>
						<th>Language</th>
						<th>Rating</th>
						<th>Duration (hours)</th>
						<th>Rental Rate</th>
						<th>Cost ($USD)</th>
						<th>Last Update</th>
						<th>Actions</th>
					</tr>
				</thead>
				<tbody id="filmsTable"></tbody>
			</table>
		</div>

		<div class="pagination">
			<button id="btnPrev" class="secondary">
				<span class="material-symbols-outlined">chevron_left</span>
				Prev
			</button>
			<span id="pageInfo"></span>
			<button id="btnNext">
				Next
				<span class="material-symbols-outlined">chevron_right</span>
			</button>
		</div>

		<div id="totalInfo"></div>

		<script th:src="@{/js/app.js}"></script>
	</body>
</html>
